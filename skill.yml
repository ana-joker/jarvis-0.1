name: jarvis-voice
description: |
  Voice-controlled JARVIS AI assistant with real-time audio, screen vision,
  browser automation, file management, coding, messaging, flight search,
  and full Windows control. Powered by Gemini Live API with 16 action modules.
  
  CAPABILITIES:
  - Real-time voice conversation (speak and listen)
  - Screen/camera vision (analyze what's on screen)
  - Browser automation (Playwright, detects default browser)
  - File/folder management (create, delete, move, copy, search)
  - Code assistant (write, edit, run, debug, build projects)
  - Messaging (WhatsApp, Telegram, Instagram DM)
  - YouTube control (play, summarize, get info, trending)
  - Flight finder (Google Flights search)
  - Weather reports
  - Windows Task Scheduler reminders
  - Computer control (volume, brightness, windows, keys, shortcuts)
  - Desktop management (wallpaper, organize, clean)
  - CMD/terminal command execution
  - Web search (Gemini Google Search + DuckDuckGo)
  - Persistent memory (learns user preferences)
  
  USAGE:
  - Launch: python main.py (full UI mode)
  - Headless: Use jarvis_bridge.py for Qwen integration
  - API: Import jarvis_skill module for programmatic access

location: user
version: 1.0.0
author: FatihMakes (original) + Albedo Qwen (integration)
source: https://github.com/ana-joker/jarvis-0.1
dependencies:
  - pyaudio
  - google-genai
  - google-generativeai
  - pillow
  - requests
  - beautifulsoup4
  - playwright
  - pyautogui
  - pyperclip
  - opencv-python
  - numpy
  - mss
  - psutil
  - send2trash
  - comtypes
  - pycaw
  - win10toast
  - duckduckgo-search
  - youtube-transcript-api
